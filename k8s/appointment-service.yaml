apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
        - name: appointment-service
          image: appointment-service:latest  # Using the locally built image
          imagePullPolicy: Never  # Prevent Kubernetes from pulling from Docker Hub
          ports:
            - containerPort: 5003
          env:
            - name: FLASK_ENV
              value: "production"

---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service
spec:
  selector:
    app: appointment-service
  ports:
    - protocol: TCP
      port: 5003
      targetPort: 5003
      nodePort: 30003  # Exposes service externally
  type: NodePort
